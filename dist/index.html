<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Resound Studio | Professional LAN Audio</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <h1>Resound Studio</h1>
      <p class="tagline">
        Broadcast engine for high-fidelity local network audio
      </p>
    </header>

    <main class="container">
      <!-- Broadcast Section -->
      <section id="broadcast-section">
        <div class="section-header">
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="2" />
            <path d="M12 2v4" />
            <path d="M12 18v4" />
            <path d="M4.93 4.93l2.83 2.83" />
            <path d="M16.24 16.24l2.83 2.83" />
            <path d="M2 12h4" />
            <path d="M18 12h4" />
            <path d="M4.93 19.07l2.83-2.83" />
            <path d="M16.24 7.76l2.83-2.83" />
          </svg>
          Broadcast
        </div>

        <div class="field">
          <label for="deviceSelect">Source</label>
          <select id="deviceSelect">
            <option value="">Default Input</option>
          </select>
        </div>

        <div class="field">
          <label class="checkbox-label">
            <input type="checkbox" id="monitorCheckbox" checked />
            Local Monitoring
          </label>
        </div>

        <div
          id="monitorSettings"
          class="field"
          style="
            padding-left: 20px;
            border-left: 1px solid var(--border-subtle);
          "
        >
          <div class="field" style="margin-bottom: 12px">
            <label for="monitorDeviceSelect">Output</label>
            <select id="monitorDeviceSelect"></select>
          </div>
          <div class="field">
            <label for="monitorSkipChannels">Channel Offset</label>
            <input type="number" id="monitorSkipChannels" value="0" min="0" />
          </div>
        </div>

        <div class="field">
          <div style="display: flex; justify-content: space-between">
            <label>Monitor gain</label>
            <span id="monitorBoostVal" class="value-display">1.5x</span>
          </div>
          <input
            type="range"
            id="monitorBoost"
            min="1"
            max="3"
            step="0.1"
            value="1.5"
          />
        </div>

        <div class="field">
          <div style="display: flex; justify-content: space-between">
            <label>Broadcast gain</label>
            <span id="broadcastBoostVal" class="value-display">3.0x</span>
          </div>
          <input
            type="range"
            id="broadcastBoost"
            min="1"
            max="3"
            step="0.1"
            value="3.0"
          />
        </div>

        <div class="btn-group">
          <button id="btnStartHost">Start Broadcast</button>
          <button id="btnStopHost" class="danger hidden">Stop Broadcast</button>
        </div>

        <div class="status-badge" id="hostStatus" style="margin-top: 10px">
          <div class="dot"></div>
          Status: Idle
        </div>

        <div
          id="session-info"
          style="font-size: 10px; color: var(--text-muted); opacity: 0.5"
        >
          SESSION_ID:
          <span id="hostSessionId" style="font-family: var(--font-mono)"
            >0000000000000</span
          >
        </div>

        <div class="log" id="hostLog"></div>
      </section>

      <!-- Receive Section -->
      <section id="receive-section">
        <div class="section-header">
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Receive
        </div>

        <div class="field">
          <button id="btnDiscover" class="secondary">Scan for Hosts</button>
        </div>

        <div class="field">
          <label for="hostSelect">Network Hosts</label>
          <select id="hostSelect" disabled>
            <option value="">No hosts discovered</option>
          </select>
        </div>

        <div class="field">
          <div style="display: flex; justify-content: space-between">
            <label>Output gain</label>
            <span id="outputBoostVal" class="value-display">1.2x</span>
          </div>
          <input
            type="range"
            id="outputBoost"
            min="1"
            max="3"
            step="0.1"
            value="1.2"
          />
        </div>

        <div class="btn-group">
          <button id="btnConnect" disabled>Connect & Listen</button>
          <button id="btnDisconnect" class="danger hidden">Disconnect</button>
        </div>

        <div class="status-badge" id="rxStatus" style="margin-top: 10px">
          <div class="dot"></div>
          Status: Idle
        </div>

        <div class="log" id="rxLog"></div>
      </section>
    </main>

    <audio id="audio" autoplay playsinline></audio>
    <script type="module" src="./app.js"></script>
  </body>
</html>
